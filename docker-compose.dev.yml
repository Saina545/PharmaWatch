version: '3.9'

# Development override - run with:
# docker-compose -f docker-compose.yml -f docker-compose.dev.yml up

services:

  postgres:
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend/src:/app/src
    environment:
      SPRING_PROFILES_ACTIVE: dev

  frontend:
    image: node:20-alpine
    container_name: pharmawatch-frontend-dev
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install --legacy-peer-deps && npm start"
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:8080/api
      CHOKIDAR_USEPOLLING: "true"
    stdin_open: true
