server.port=8080

# Database - Supabase PostgreSQL
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/pharmawatch}


spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:password}

spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=${JWT_SECRET:pharmawatch-super-secret-key-that-is-at-least-256-bits-long-for-hs256}
app.jwt.expiration=86400000
app.jwt.refresh-expiration=604800000

# Email (configure with real SMTP for production)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:noreply@pharmawatch.com}
spring.mail.password=${MAIL_PASSWORD:password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# App
app.frontend-url=${FRONTEND_URL:http://localhost:3000}
app.password-reset-token-expiry=3600000

# CORS
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}

# Logging
logging.level.com.pharmawatch=DEBUG
logging.level.org.springframework.security=INFO
